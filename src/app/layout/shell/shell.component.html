<div class="shell-layout" [class.sidebar-collapsed]="sidebarCollapsed()">
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">VBBS</span>
      <p-button
        icon="pi pi-bars"
        [text]="true"
        [rounded]="true"
        severity="secondary"
        (onClick)="toggleSidebar()"
      />
    </div>

    <nav class="sidebar-nav">
      @for (item of navItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="active"
          class="nav-item"
          [title]="item.label"
        >
          <i [class]="item.icon"></i>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="sidebar-footer">
      <button class="nav-item nav-logout" (click)="logout()" title="Sair">
        <i class="pi pi-sign-out"></i>
        <span class="nav-label">Sair</span>
      </button>
    </div>
  </aside>

  <div class="main-area">
    <header class="topbar">
      <span class="topbar-title">VBBS Manager</span>
    </header>

    <main class="main-content">
      <router-outlet />
    </main>
  </div>
</div>
